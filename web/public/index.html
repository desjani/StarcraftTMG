<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarCraft TMG · Roster Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&display=swap');

    :root {
      --bg-0:      #07090f;
      --bg-1:      #0a1220;
      --bg-2:      #121a2b;
      --surface:   #111b2e;
      --surface-2: #17243a;
      --line:      #314563;
      --line-soft: #233650;
      --text:      #d4deed;
      --muted:     #93a8c4;
      --accent:    #66b6ff;
      --accent-2:  #45f2ff;
      --terran:    #7db4ff;
      --protoss:   #65f4ff;
      --zerg:      #f76db2;
      --green:     #46d48a;
      --yellow:    #f1bf59;
      --red:       #ff626b;
      --shadow:    rgba(0, 0, 0, .5);
      --mono:      'Consolas', 'Courier New', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      position: relative;
      min-height: 100vh;
      line-height: 1.45;
      color: var(--text);
      font-family: 'Rajdhani', 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(103, 176, 255, .14), transparent 38%),
        radial-gradient(circle at 84% 24%, rgba(77, 245, 255, .1), transparent 34%),
        radial-gradient(circle at 76% 78%, rgba(247, 109, 178, .08), transparent 32%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1) 52%, var(--bg-2));
      animation: boot-in .45s ease-out both;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .28;
      background-image:
        linear-gradient(rgba(88, 132, 194, .14) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88, 132, 194, .14) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(transparent, rgba(0, 0, 0, .18));
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(11, 20, 35, .94), rgba(9, 16, 29, .88));
      backdrop-filter: blur(7px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .28);
    }
    header h1 {
      color: var(--terran);
      font-size: 1.05rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      text-shadow: 0 0 14px rgba(102, 182, 255, .3);
    }
    .badge {
      font-family: 'Orbitron', sans-serif;
      font-size: .62rem;
      letter-spacing: .08em;
      border-radius: 999px;
      padding: 3px 9px;
      color: var(--protoss);
      border: 1px solid rgba(101, 244, 255, .45);
      background: rgba(101, 244, 255, .1);
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px 18px 42px;
    }
    .lookup-shell { width: 100%; }
    body.preload main {
      min-height: calc(100vh - 68px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.preload .lookup-shell {
      max-width: 860px;
      width: 100%;
    }

    .search-bar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      margin-bottom: 20px;
      padding: 14px;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(20, 33, 54, .78), rgba(16, 25, 42, .8));
      box-shadow: 0 14px 28px var(--shadow);
      animation: rise-in .32s ease-out both;
    }
    .seed-history {
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(20, 33, 54, .62), rgba(14, 24, 40, .67));
    }
    .seed-history-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .seed-history-group {
      border: 1px solid rgba(49, 69, 99, .42);
      border-radius: 8px;
      padding: 10px;
      background: rgba(13, 22, 36, .4);
    }
    .seed-history-title {
      color: var(--text);
      font-family: 'Orbitron', sans-serif;
      font-size: .62rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .seed-history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .seed-history-head .seed-history-title { margin-bottom: 0; }
    .seed-history-group.collapsed .seed-list,
    .seed-history-group.collapsed .seed-empty {
      display: none !important;
    }
    .seed-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .seed-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(18, 31, 50, .75);
      color: var(--text);
      font-family: var(--mono);
      font-size: .72rem;
      padding: 3px 10px;
      cursor: pointer;
    }
    .seed-pill:hover { border-color: var(--protoss); color: var(--protoss); }
    .seed-empty {
      color: var(--muted);
      font-size: .78rem;
      font-style: italic;
    }
    .favorite-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .favorite-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid rgba(49, 69, 99, .42);
      border-radius: 6px;
      padding: 6px 8px;
      background: rgba(16, 28, 45, .54);
    }
    .favorite-meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .favorite-name {
      color: var(--text);
      font-size: .82rem;
      line-height: 1.1;
    }
    .favorite-seed {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .72rem;
    }
    .favorite-actions {
      display: inline-flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .search-bar input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--line);
      color: var(--text);
      background: linear-gradient(180deg, rgba(13, 22, 36, .95), rgba(11, 18, 31, .96));
      font-size: 1.02rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      font-family: var(--mono);
      outline: none;
      transition: border-color .18s, box-shadow .18s, transform .18s;
    }
    .search-bar input::placeholder {
      color: var(--muted);
      letter-spacing: normal;
      text-transform: none;
      font-family: 'Rajdhani', sans-serif;
      font-size: .92rem;
    }
    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(102, 182, 255, .16), inset 0 0 16px rgba(102, 182, 255, .06);
      transform: translateY(-1px);
    }
    .search-bar input:focus-visible,
    .limit-group input[type=number]:focus-visible,
    .opt-label input[type=checkbox]:focus-visible {
      outline: 2px solid var(--protoss);
      outline-offset: 2px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 22px;
      font-family: 'Orbitron', sans-serif;
      font-size: .73rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 700;
      cursor: pointer;
      color: #061220;
      background: linear-gradient(180deg, #79c4ff, #53a8f2);
      transition: transform .16s, filter .16s, box-shadow .16s;
      white-space: nowrap;
      box-shadow: 0 6px 16px rgba(83, 168, 242, .33);
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.07);
    }
    .btn:focus-visible {
      outline: 2px solid var(--protoss);
      outline-offset: 2px;
    }
    .btn:disabled {
      cursor: not-allowed;
      opacity: .45;
      box-shadow: none;
      transform: none;
    }
    .btn.ghost {
      background: linear-gradient(180deg, rgba(26, 41, 64, .72), rgba(17, 28, 46, .8));
      color: var(--text);
      border-color: var(--line);
      box-shadow: none;
    }
    .btn.ghost:hover:not(:disabled) {
      color: var(--protoss);
      border-color: var(--protoss);
      box-shadow: 0 0 0 2px rgba(101, 244, 255, .11);
    }
    .btn.sm { padding: 5px 10px; font-size: .62rem; }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      padding: 8px;
      background: linear-gradient(180deg, rgba(19, 30, 49, .86), rgba(14, 24, 40, .87));
      box-shadow: 0 12px 24px var(--shadow);
      animation: rise-in .36s ease-out both;
    }
    .tab {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      padding: 8px 13px;
      color: var(--muted);
      font-family: 'Orbitron', sans-serif;
      font-size: .64rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color .16s, color .16s, background .16s, box-shadow .16s;
    }
    .tab:hover {
      color: var(--text);
      border-color: var(--line);
    }
    .tab:focus-visible {
      outline: 2px solid var(--protoss);
      outline-offset: 1px;
      color: var(--text);
      border-color: var(--protoss);
    }
    .tab.active {
      color: var(--protoss);
      border-color: rgba(101, 244, 255, .52);
      background: linear-gradient(180deg, rgba(43, 74, 103, .58), rgba(21, 42, 62, .65));
      box-shadow: inset 0 0 0 1px rgba(101, 244, 255, .14), 0 0 18px rgba(101, 244, 255, .12);
    }

    .panel { display: none; }
    .panel.active {
      display: block;
      animation: panel-in .22s ease-out both;
    }

    .tab-options {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(20, 33, 54, .72), rgba(15, 26, 43, .74));
      color: var(--muted);
      font-size: .86rem;
    }
    .opt-row {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
    }
    .opt-row.secondary {
      padding-top: 8px;
      border-top: 1px solid rgba(49, 69, 99, .35);
      margin-top: 2px;
    }
    .opt-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .opt-group-title {
      color: var(--text);
      font-family: 'Orbitron', sans-serif;
      font-size: .62rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-right: 2px;
    }
    .opt-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      transition: color .16s;
    }
    .opt-label:hover { color: var(--text); }
    .opt-label input[type=checkbox] {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
    }
    .limit-group { display: inline-flex; align-items: center; gap: 8px; }
    .limit-group input[type=number] {
      width: 88px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 8px;
      background: rgba(10, 19, 33, .85);
      color: var(--text);
      font-family: var(--mono);
      font-size: .8rem;
      outline: none;
    }
    .limit-readout {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .76rem;
      white-space: nowrap;
    }

    .output-wrap { position: relative; }
    .output-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      min-height: 160px;
      overflow-x: auto;
      white-space: pre;
      line-height: 1.65;
      font-size: .88rem;
      font-family: var(--mono);
      color: #eff6ff;
      background:
        linear-gradient(180deg, rgba(17, 29, 48, .98), rgba(13, 22, 37, .96)),
        repeating-linear-gradient(to bottom, transparent 0 24px, rgba(108, 150, 212, .03) 24px 25px);
      box-shadow: inset 0 0 0 1px rgba(125, 180, 255, .08), 0 14px 30px var(--shadow);
    }
    .output-box.wrap { white-space: pre-wrap; word-break: break-word; }
    .abs-actions {
      position: absolute;
      top: 11px;
      right: 11px;
      display: flex;
      gap: 6px;
    }
    .abs-copy { position: static; }
    .mode-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: .78rem;
      user-select: none;
    }
    .mode-switch input { display: none; }
    .mode-track {
      width: 42px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(15, 25, 40, .85);
      position: relative;
      transition: border-color .16s, background .16s;
      cursor: pointer;
    }
    .mode-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform .16s, background .16s;
    }
    .mode-switch input:checked + .mode-track {
      border-color: rgba(101, 244, 255, .58);
      background: rgba(28, 57, 80, .88);
    }
    .mode-switch input:checked + .mode-track::after {
      transform: translateX(20px);
      background: var(--protoss);
    }
    .discord-raw {
      display: none;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .char-counter { margin-top: 7px; text-align: right; font-size: .74rem; color: var(--muted); }
    .char-counter.warn { color: var(--yellow); }
    .char-counter.over { color: var(--red); }
    .limit-warning {
      margin-top: 8px;
      border: 1px solid rgba(255, 98, 107, .6);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--red);
      background: rgba(255, 98, 107, .1);
      font-size: .78rem;
      display: none;
    }

    .roster-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(19, 31, 50, .95), rgba(14, 22, 36, .96));
      box-shadow: 0 16px 30px var(--shadow);
    }
    .roster-card.faction-terran {
      background:
        linear-gradient(180deg, rgba(22, 38, 63, .96), rgba(13, 22, 36, .96)),
        radial-gradient(circle at 82% 12%, rgba(125, 180, 255, .14), transparent 42%);
    }
    .roster-card.faction-zerg {
      background:
        linear-gradient(180deg, rgba(46, 22, 44, .92), rgba(17, 18, 33, .97)),
        radial-gradient(circle at 78% 14%, rgba(247, 109, 178, .16), transparent 40%);
    }
    .roster-card.faction-protoss {
      background:
        linear-gradient(180deg, rgba(19, 39, 59, .95), rgba(12, 25, 39, .97)),
        radial-gradient(circle at 82% 10%, rgba(101, 244, 255, .16), transparent 42%);
    }
    .roster-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(90deg, rgba(89, 143, 232, .14), rgba(101, 244, 255, .05) 58%, rgba(247, 109, 178, .05));
    }
    .roster-faction {
      font-size: 1.32rem;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: .05em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .roster-faction.Terran  { color: var(--terran); }
    .roster-faction.Protoss { color: var(--protoss); }
    .roster-faction.Zerg    { color: var(--zerg); }
    .roster-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 6px; color: var(--muted); font-size: .82rem; }
    .meta-supply { color: var(--red); }
    .resource-icon {
      display: inline-block;
      min-width: 1.05em;
      text-align: center;
      font-weight: 700;
    }
    .resource-faction-terran { color: var(--terran); }
    .resource-faction-zerg { color: var(--zerg); }
    .resource-faction-protoss { color: var(--protoss); }
    .slot-breakdown {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }
    .slot-breakdown-label {
      color: var(--muted);
      font-size: .66rem;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .slot-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      background: rgba(15, 27, 43, .58);
      color: var(--text);
      font-family: var(--mono);
      font-size: .72rem;
    }
    .slot-chip-type {
      color: inherit;
      font-family: 'Orbitron', sans-serif;
      font-size: .62rem;
      letter-spacing: .08em;
    }
    .slot-chip.slot-hero {
      color: var(--yellow);
      border-color: rgba(241, 191, 89, .55);
      background: rgba(241, 191, 89, .1);
    }
    .slot-chip.slot-core {
      color: var(--protoss);
      border-color: rgba(101, 244, 255, .55);
      background: rgba(101, 244, 255, .1);
    }
    .slot-chip.slot-elite {
      color: var(--red);
      border-color: rgba(255, 98, 107, .55);
      background: rgba(255, 98, 107, .1);
    }
    .slot-chip.slot-support {
      color: var(--green);
      border-color: rgba(70, 212, 138, .55);
      background: rgba(70, 212, 138, .1);
    }
    .slot-chip.slot-air {
      color: var(--accent);
      border-color: rgba(102, 182, 255, .55);
      background: rgba(102, 182, 255, .1);
    }
    .slot-chip.slot-other {
      color: var(--muted);
      border-color: rgba(147, 168, 196, .48);
      background: rgba(147, 168, 196, .08);
    }
    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      background: rgba(23, 36, 58, .7);
      font-size: .72rem;
    }
    .tag .tact-tag-name { color: var(--muted); }
    .tag .tact-tag-resource { color: var(--protoss); }
    .tag .tact-tag-gas { color: var(--yellow); }
    .tag .tact-tag-supply { color: var(--green); }
    .tag .tact-slot-bracket { color: var(--muted); }
    .tag .tact-slot-core { color: var(--protoss); }
    .tag .tact-slot-elite { color: var(--red); }
    .tag .tact-slot-support { color: var(--green); }
    .tag .tact-slot-hero { color: var(--yellow); }
    .tag .tact-slot-air { color: var(--accent); }
    .tag .tact-slot-other { color: var(--muted); }
    .seed-tag {
      color: var(--accent);
      border-color: rgba(102, 182, 255, .52);
      font-family: var(--mono);
      letter-spacing: .07em;
    }

    .unit-list { padding: 0; }
    .unit-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 11px 20px;
      border-bottom: 1px solid var(--line-soft);
      transition: background .16s ease;
    }
    .unit-row:hover { background: rgba(101, 244, 255, .045); }
    .roster-card.faction-terran .unit-row { border-bottom-color: rgba(125, 180, 255, .26); }
    .roster-card.faction-zerg .unit-row { border-bottom-color: rgba(247, 109, 178, .26); }
    .roster-card.faction-protoss .unit-row { border-bottom-color: rgba(101, 244, 255, .26); }
    .roster-card.faction-terran .unit-row:hover { background: rgba(125, 180, 255, .08); }
    .roster-card.faction-zerg .unit-row:hover { background: rgba(247, 109, 178, .085); }
    .roster-card.faction-protoss .unit-row:hover { background: rgba(101, 244, 255, .085); }
    .unit-row:last-child { border-bottom: none; }
    .unit-type-badge {
      min-width: 30px;
      height: 22px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .68rem;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: .07em;
      flex-shrink: 0;
      border: 1px solid transparent;
    }
    .badge-Hero    { background: rgba(241, 191, 89, .14); color: var(--yellow); border-color: rgba(241, 191, 89, .65); }
    .badge-Core    { background: rgba(101, 244, 255, .12); color: var(--protoss);  border-color: rgba(101, 244, 255, .58); }
    .badge-Elite   { background: rgba(255, 98, 107, .12); color: var(--red); border-color: rgba(255, 98, 107, .62); }
    .badge-Support { background: rgba(70, 212, 138, .13); color: var(--green); border-color: rgba(70, 212, 138, .62); }
    .badge-Air     { background: rgba(102, 182, 255, .13); color: var(--accent); border-color: rgba(102, 182, 255, .62); }
    .badge-Other   { background: rgba(147, 168, 196, .12); color: var(--muted); border-color: rgba(147, 168, 196, .5); }

    .unit-info { flex: 1; min-width: 0; }
    .unit-main {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px;
      margin-top: 1px;
    }
    .unit-name { font-weight: 700; font-size: .96rem; }
    .unit-main-meta {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .78rem;
      letter-spacing: .01em;
    }
    .unit-size { color: var(--muted); }
    .unit-sep { color: rgba(147, 168, 196, .65); }
    .unit-supply { color: var(--red); }
    .unit-main-cost { color: var(--yellow); }
    .unit-sub { margin-top: 2px; font-size: .78rem; color: var(--muted); }
    .unit-sub-line {
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    .unit-stats-inline {
      color: var(--muted);
      font-family: var(--mono);
      font-size: .72rem;
    }
    .unit-stats-line {
      margin-top: 4px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: .72rem;
    }
    .unit-upgrades { display: inline-flex; flex-wrap: wrap; gap: 5px; }
    .upg-pill {
      border-radius: 999px;
      border: 1px solid rgba(70, 212, 138, .44);
      background: rgba(70, 212, 138, .08);
      color: var(--green);
      padding: 1px 9px;
      font-size: .72rem;
    }
    .upg-pill strong { color: var(--yellow); }
    .unit-cost { padding-top: 2px; white-space: nowrap; font-family: var(--mono); font-size: .88rem; color: var(--yellow); font-weight: 700; }

    .tact-section {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      padding: 10px 20px;
      border-top: 1px solid var(--line-soft);
      background: rgba(14, 23, 37, .7);
    }
    .tact-label {
      margin-right: 5px;
      color: var(--muted);
      font-size: .66rem;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .aid-unit { border-bottom: 1px solid var(--line-soft); }
    .aid-unit:last-child { border-bottom: none; }
    .aid-unit-header {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 20px 8px;
      transition: background .16s ease;
    }
    .aid-unit-header:hover { background: rgba(101, 244, 255, .038); }
    .aid-body { padding: 0 20px 12px 60px; }
    .aid-stats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .stat-chip {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 2px 9px;
      color: var(--muted);
      background: rgba(19, 31, 50, .55);
      font-family: var(--mono);
      font-size: .72rem;
    }
    .stat-chip strong { color: var(--accent); }
    .aid-upgrades { display: flex; flex-direction: column; gap: 3px; }
    .aid-upg { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; font-size: .79rem; }
    .aid-upg.is-active { color: var(--green); }
    .aid-upg.is-inactive { color: var(--muted); }
    .aid-upg-name { font-weight: 600; }
    .aid-upg-cost { white-space: nowrap; font-size: .72rem; font-family: var(--mono); font-weight: 700; }
    .aid-upg-meta { font-size: .69rem; font-style: italic; }
    .aid-upg-desc { width: 100%; margin-top: 1px; color: var(--text); opacity: .82; font-size: .74rem; }
    .aid-tags { margin-bottom: 6px; color: var(--muted); font-size: .74rem; font-style: italic; }

    .error {
      margin-bottom: 14px;
      border: 1px solid rgba(255, 98, 107, .74);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--red);
      background: rgba(255, 98, 107, .1);
      box-shadow: 0 12px 25px var(--shadow);
    }
    .loading {
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 22px;
      text-align: center;
      color: var(--muted);
      background: rgba(16, 26, 43, .72);
      box-shadow: 0 12px 24px var(--shadow);
    }

    #toast-container {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      max-width: 330px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      background: linear-gradient(180deg, rgba(19, 33, 53, .97), rgba(13, 23, 38, .97));
      color: var(--text);
      font-size: .86rem;
      pointer-events: auto;
      box-shadow: 0 12px 24px var(--shadow);
      animation: toast-in .2s ease forwards;
    }
    .toast.success { border-left-color: var(--green); }
    .toast.error   { border-left-color: var(--red); }
    .toast.is-leaving { animation: toast-out .2s ease forwards; }

    @keyframes boot-in {
      from { opacity: 0; filter: saturate(.85) contrast(.95); }
      to { opacity: 1; filter: saturate(1) contrast(1); }
    }
    @keyframes rise-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes panel-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(16px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes toast-out {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(14px); }
    }

    @media (max-width: 880px) {
      header { padding: 12px 14px; }
      header h1 { font-size: .87rem; }
      .tabs { gap: 6px; }
      .tab { font-size: .58rem; }
    }
    @media (max-width: 680px) {
      main { padding: 20px 12px 34px; }
      .search-bar {
        grid-template-columns: 1fr;
        padding: 10px;
      }
      .seed-history-grid { grid-template-columns: 1fr; }
      .search-bar input { font-size: .93rem; letter-spacing: .16em; }
      .btn { width: 100%; }
      .tab-options {
        flex-direction: column;
        align-items: flex-start;
        gap: 9px;
      }
      .aid-body { padding-left: 20px; }
      #toast-container { left: 12px; right: 12px; bottom: 14px; }
      .toast { max-width: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body class="preload">
  <header>
    <h1>⬡ StarCraft TMG · Roster Viewer</h1>
    <span class="badge">v1.0</span>
  </header>

  <main>
    <div class="lookup-shell">
      <!-- Search -->
      <div class="search-bar">
        <input type="text" id="seed-input"
               placeholder="Enter roster seed (e.g. TRN9X2)"
               maxlength="10" autocomplete="off" spellcheck="false">
        <button class="btn" id="load-btn">Load Roster</button>
        <button class="btn ghost" id="recent-toggle-btn">Hide History</button>
      </div>

      <div class="seed-history" id="seed-history-section">
        <div class="seed-history-grid">
          <div class="seed-history-group" id="recent-group">
            <div class="seed-history-title">Recent Seeds</div>
            <div class="seed-list" id="recent-seeds"></div>
            <div class="seed-empty" id="no-recent">No recent seeds yet.</div>
          </div>
          <div class="seed-history-group">
            <div class="seed-history-head">
              <div class="seed-history-title">Favorites</div>
              <button class="btn ghost sm" id="save-favorite-btn">Save Favorite</button>
            </div>
            <div class="favorite-list" id="favorite-seeds"></div>
            <div class="seed-empty" id="no-favorites">No favorites saved yet.</div>
          </div>
        </div>
      </div>

      <!-- Loading / Error -->
      <div id="loading-box" style="display:none" class="loading" role="status" aria-live="polite" aria-atomic="true">⟳ Fetching roster…</div>
      <div id="error-box"   style="display:none" role="alert" aria-live="assertive" aria-atomic="true"></div>
    </div>

    <!-- Results -->
    <div id="results" style="display:none">
      <div class="tabs" role="tablist" aria-label="Output views">
        <button class="tab active" type="button" role="tab" aria-selected="true" aria-controls="tab-preview" tabindex="0" data-tab="preview">Discord</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="tab-roster" tabindex="-1" data-tab="roster">Roster Card</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="tab-aid" tabindex="-1" data-tab="aid">Player Aid</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="tab-json" tabindex="-1" data-tab="json">JSON</button>
      </div>

      <!-- Discord / Raw shared options (hidden on other tabs) -->
      <div id="discord-opts" class="tab-options">
        <div class="opt-row">
          <div class="opt-group">
            <span class="opt-group-title">Style</span>
            <label class="opt-label"><input type="checkbox" id="opt-plain"> Plain text (No color)</label>
            <label class="opt-label"><input type="checkbox" id="opt-abbr"> Abbreviate Upgrades</label>
            <label class="opt-label"><input type="checkbox" id="opt-tact-abbr"> Abbreviate Tac Cards</label>
            <label class="opt-label"><input type="checkbox" id="opt-tact-lines"> Multiline Tac Card List</label>
          </div>
          <div class="opt-group">
            <span class="opt-group-title">Show/Hide</span>
            <label class="opt-label"><input type="checkbox" id="opt-slot-breakdown"> Slot breakdown</label>
            <label class="opt-label"><input type="checkbox" id="opt-tact-supply"> Tac Card Supply slots</label>
            <label class="opt-label"><input type="checkbox" id="opt-tact-resource"> Tac Card Faction resource</label>
            <label class="opt-label"><input type="checkbox" id="opt-tact-gas"> Tac Card Gas costs</label>
            <label class="opt-label"><input type="checkbox" id="opt-stats"> Unit Stats</label>
          </div>
        </div>
        <div class="opt-row secondary">
          <div class="opt-group">
            <span class="opt-group-title">Mode</span>
            <label class="mode-switch" for="discord-mode-toggle">
              <span>Preview</span>
              <input type="checkbox" id="discord-mode-toggle" aria-label="Toggle Discord output mode between preview and raw text">
              <span class="mode-track" aria-hidden="true"></span>
              <span>Raw</span>
            </label>
          </div>
          <div class="limit-group">
            <label for="opt-limit">Char limit:</label>
            <input type="number" id="opt-limit" value="2000" min="500" max="4096" step="100">
            <span class="limit-readout" id="opt-char-readout">0 chars</span>
          </div>
        </div>
        <div class="limit-warning" id="discord-limit-warning" role="alert" aria-live="polite"></div>
      </div>

      <!-- Discord Preview -->
      <div id="tab-preview" class="panel active" role="tabpanel" tabindex="0">
        <div class="output-wrap">
          <div class="output-box" id="preview-box">
            <div id="preview-content"></div>
            <div id="raw-box" class="discord-raw"></div>
          </div>
        </div>
        <button class="btn ghost" id="copy-preview-btn" style="margin-top:10px;width:100%">Copy for Discord</button>
        <div class="char-counter" id="char-counter" aria-live="polite" aria-atomic="true"></div>
      </div>

      <!-- Roster Card -->
      <div id="tab-roster" class="panel" role="tabpanel" tabindex="0" hidden>
        <div class="tab-options">
          <div class="opt-row">
            <div class="opt-group">
              <span class="opt-group-title">Show/Hide</span>
              <label class="opt-label"><input type="checkbox" id="card-upgrades" checked> Upgrades</label>
              <label class="opt-label"><input type="checkbox" id="card-stats"> Unit stats</label>
              <label class="opt-label"><input type="checkbox" id="card-size" checked> Unit size</label>
              <label class="opt-label"><input type="checkbox" id="card-cost" checked> Cost</label>
              <label class="opt-label"><input type="checkbox" id="card-slots"> Supply slots</label>
              <label class="opt-label"><input type="checkbox" id="card-tactical" checked> Tactical cards</label>
              <label class="opt-label"><input type="checkbox" id="card-tact-resource"> Tac card faction resource</label>
              <label class="opt-label"><input type="checkbox" id="card-tact-gas"> Tac card gas costs</label>
              <label class="opt-label"><input type="checkbox" id="card-tact-supply"> Tac card supply slots</label>
            </div>
          </div>
        </div>
        <div id="roster-card"></div>
        <div style="display:flex;gap:10px;margin-top:12px;">
          <button class="btn" id="download-img-btn" style="display:none">⬇ Download Image</button>
          <button class="btn ghost" id="copy-img-btn" style="display:none">⧉ Copy Image</button>
        </div>
      </div>

      <!-- Player Aid -->
      <div id="tab-aid" class="panel" role="tabpanel" tabindex="0" hidden>
        <div class="tab-options">
          <div class="opt-row">
            <div class="opt-group">
              <span class="opt-group-title">Show/Hide</span>
              <label class="opt-label"><input type="checkbox" id="aid-stats" checked> Stats</label>
              <label class="opt-label"><input type="checkbox" id="aid-all-upgrades" checked> All upgrades</label>
              <label class="opt-label"><input type="checkbox" id="aid-activation" checked> Activation info</label>
              <label class="opt-label"><input type="checkbox" id="aid-tactical" checked> Tactical cards</label>
            </div>
          </div>
        </div>
        <div id="aid-card"></div>
        <div style="display:flex;gap:10px;margin-top:12px;">
          <button class="btn" id="aid-download-btn" style="display:none">⬇ Download Image</button>
          <button class="btn ghost" id="aid-copy-img-btn" style="display:none">⧉ Copy Image</button>
        </div>
      </div>

      <!-- JSON -->
      <div id="tab-json" class="panel" role="tabpanel" tabindex="0" hidden>
        <div class="output-box wrap" id="json-box" style="font-size:.78rem"></div>
        <button class="btn ghost" id="copy-json-btn" style="margin-top:10px;width:100%">
          Copy JSON
        </button>
      </div>
    </div>
  </main>

  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
