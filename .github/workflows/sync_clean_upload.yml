
name: Sync and Clean Army Units

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  sync-clean-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install node-fetch@3 @google-cloud/storage

      - name: Run sync and clean script
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          node .github/workflows/sync_clean_upload.js

      - name: Generate object-mapped JSON files
        run: |
          node scripts/generate_army_units_object.js
          node scripts/generate_rules_sections_object.js
          node scripts/generate_tactical_cards_object.js

      - name: Commit and push updated cleaned and object-mapped data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/army_units_cleaned.json data/rules_sections_cleaned.json data/tactical_cards_cleaned.json data/army_units_object.json data/rules_sections_object.json data/tactical_cards_object.json
          git commit -m "chore: update cleaned and object-mapped data [auto-sync]" || echo "No changes to commit"
          git push
